<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所有影評 — 爆米花 Popcorn</title>
  <meta name="description" content="瀏覽所有電影影評，依類型快速篩選。">
  <meta property="og:title" content="電影影評 — 爆米花 Popcorn">
  <meta property="og:description" content="瀏覽所有電影影評，依類型快速篩選。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="爆米花 Popcorn">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">爆米花 Popcorn</a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="reviews.html">電影</a></li>
          <li><a href="reviews.html?type=series">影集</a></li>
          <li><a href="books.html">書本</a></li>
          <li><a href="reviews.html?playlist=1">主題片單</a></li>
        </ul>
        <div class="nav-search-wrap">
          <button class="nav-search-btn" onclick="this.closest('.nav-search-wrap').classList.toggle('open')" aria-label="搜尋">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <input class="nav-search-input" type="search" placeholder="搜尋影片名稱…" onkeydown="if(event.key==='Enter'&&this.value)location.href='reviews.html?q='+encodeURIComponent(this.value)">
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>電影影評</h1>
      <p class="subtitle">共 <span id="count">—</span> 篇</p>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="搜尋片名、導演…">
    </div>

    <div class="filter-bar" id="filter-bar">
      <span class="tag-pill active" data-filter="all">全部</span>
      <span class="tag-pill" data-filter="no-spoiler">✓ 只看無雷</span>
    </div>

    <div class="card-grid" id="reviews-grid">
      <div class="loading">載入中…</div>
    </div>
  </div>

  <footer>
    <p id="footer-copy">爆米花 Popcorn &copy; <span id="year"></span></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script src="shared.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    let allArticles = [];
    let activeFilter = 'all';
    let searchQuery = '';

    function applyFilters() {
      let result = allArticles;

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        result = result.filter(a =>
          (a.title || '').toLowerCase().includes(q) ||
          (a.director || '').toLowerCase().includes(q) ||
          (a.excerpt || '').toLowerCase().includes(q)
        );
      }

      if (activeFilter === 'no-spoiler') {
        result = result.filter(a => !a.has_spoiler);
      } else if (activeFilter.startsWith('genre:')) {
        result = result.filter(a => a.genre === activeFilter.slice(6));
      }

      renderGrid(result);
    }

    function renderGrid(articles) {
      const grid = document.getElementById('reviews-grid');
      if (!articles.length) {
        grid.innerHTML = '<div class="search-empty">找不到符合的影評</div>';
        return;
      }
      grid.innerHTML = articles.map(a => cardHTML(a)).join('');
    }

    function buildFilters(articles) {
      const genres = [...new Set(articles.map(a => a.genre).filter(Boolean))];
      const bar = document.getElementById('filter-bar');

      genres.forEach(g => {
        const el = document.createElement('span');
        el.className = 'tag-pill';
        el.dataset.filter = `genre:${g}`;
        el.textContent = g;
        bar.appendChild(el);
      });

      bar.addEventListener('click', e => {
        const pill = e.target.closest('.tag-pill');
        if (!pill) return;
        bar.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        activeFilter = pill.dataset.filter;
        applyFilters();
      });
    }

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      applyFilters();
    });

    async function loadReviews() {
      const { data, error } = await db
        .from('articles')
        .select('*')
        .eq('is_published', true)
        .or('content_type.eq.movie,content_type.is.null')
        .order('published_at', { ascending: false });

      if (error || !data) {
        document.getElementById('reviews-grid').innerHTML =
          '<div class="empty-state">載入失敗，請稍後再試</div>';
        return;
      }
      allArticles = data;
      document.getElementById('count').textContent = data.length;
      buildFilters(data);
      renderGrid(data);
    }

    loadReviews();

    let clickCount = 0, clickTimer;
    document.getElementById('footer-copy').addEventListener('click', () => {
      clickCount++;
      clearTimeout(clickTimer);
      if (clickCount >= 3) { clickCount = 0; location.href = 'admin.html'; return; }
      clickTimer = setTimeout(() => { clickCount = 0; }, 600);
    });
  </script>
</body>
</html>
