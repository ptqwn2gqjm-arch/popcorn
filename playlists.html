<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主題片單 — 爆米花 Popcorn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">爆米花 Popcorn</a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="reviews.html">電影</a></li>
          <li><a href="reviews.html?type=series">影集</a></li>
          <li><a href="books.html">書本</a></li>
          <li><a href="playlists.html" class="active">主題片單</a></li>
        </ul>
        <div class="nav-search-wrap">
          <button class="nav-search-btn" onclick="this.closest('.nav-search-wrap').classList.toggle('open')" aria-label="搜尋">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <input class="nav-search-input" type="search" placeholder="搜尋影片名稱…" onkeydown="if(event.key==='Enter'&&this.value)location.href='reviews.html?q='+encodeURIComponent(this.value)">
        </div>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top:48px;">
    <div class="section-label">主題片單</div>
    <div id="playlist-grid" class="card-grid">
      <div class="loading">載入中…</div>
    </div>
  </div>

  <footer>
    <p>爆米花 Popcorn &copy; <span id="year"></span></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="utils.js?v=3"></script>
  <script src="shared.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    async function loadPlaylists() {
      const { data, error } = await db
        .from('playlists')
        .select('*')
        .order('created_at', { ascending: false });

      const grid = document.getElementById('playlist-grid');
      if (error || !data || !data.length) {
        grid.innerHTML = '<div class="empty-state">尚無片單</div>'; return;
      }

      // 每個片單抓最新一篇文章的封面
      const ids = data.map(p => p.id);
      const { data: articles } = await db
        .from('articles')
        .select('playlist_id, thumbnail_image, cover_image')
        .in('playlist_id', ids)
        .eq('is_published', true);

      const coverMap = {};
      (articles || []).forEach(a => {
        if (!coverMap[a.playlist_id]) coverMap[a.playlist_id] = a.thumbnail_image || a.cover_image;
      });

      grid.innerHTML = data.map(p => {
        const img = coverMap[p.id];
        return `
          <div class="card" onclick="location.href='playlist.html?id=${p.id}'">
            <div class="card-image">
              ${img
                ? `<img src="${img}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML=filmPlaceholder()">`
                : filmPlaceholder()}
            </div>
            <div class="card-title" style="margin-top:10px;">${p.name}</div>
            ${p.description ? `<div class="card-excerpt">${p.description}</div>` : ''}
          </div>`;
      }).join('');
    }

    loadPlaylists();
  </script>
</body>
</html>
