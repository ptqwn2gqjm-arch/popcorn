<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爆米花 Popcorn — 個人影評誌</title>
  <meta name="description" content="一個關於電影與書的個人評誌，有誠意的觀點，有溫度的文字。">
  <meta property="og:title" content="爆米花 Popcorn — 個人影評誌">
  <meta property="og:description" content="一個關於電影與書的個人評誌，有誠意的觀點，有溫度的文字。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="爆米花 Popcorn">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">爆米花 Popcorn</a>
      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="reviews.html">電影</a></li>
          <li><a href="reviews.html?type=series">影集</a></li>
          <li><a href="books.html">書本</a></li>
          <li><a href="playlists.html">主題片單</a></li>
        </ul>
        <div class="nav-search-wrap">
          <button class="nav-search-btn" onclick="this.closest('.nav-search-wrap').classList.toggle('open')" aria-label="搜尋">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <input class="nav-search-input" type="search" placeholder="搜尋影片名稱…" onkeydown="if(event.key==='Enter'&&this.value)location.href='reviews.html?q='+encodeURIComponent(this.value)">
        </div>
      </div>
    </div>
  </nav>

  <section class="hero container" id="hero-section">
    <div class="loading">載入中…</div>
  </section>

  <div class="container">
    <div class="section-label">最新影評</div>
    <div class="card-grid" id="latest-grid">
      <div class="loading">載入中…</div>
    </div>
    <div style="text-align:center; margin-bottom: 80px;">
      <a href="reviews.html" class="btn">查看全部影評</a>
    </div>
  </div>

  <div class="container" id="books-section" style="display:none;">
    <div class="section-label">最新書評</div>
    <div class="card-grid" id="latest-books-grid"></div>
    <div style="text-align:center; margin-bottom: 80px;">
      <a href="books.html" class="btn">查看全部書評</a>
    </div>
  </div>

  <footer>
    <p id="footer-copy">爆米花 Popcorn &copy; <span id="year"></span> &nbsp;·&nbsp; 個人影評誌</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script src="shared.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    async function loadHome() {
      const { data, error } = await db
        .from('articles')
        .select('*')
        .eq('is_published', true)
        .order('published_at', { ascending: false })
        .limit(7);

      if (error || !data || !data.length) {
        document.getElementById('hero-section').innerHTML =
          '<div class="empty-state">尚無影評，快去後台發第一篇吧！</div>';
        document.getElementById('latest-grid').innerHTML = '';
        return;
      }

      const [featured, ...rest] = data;

      const heroSlides = data.slice(0, 3);
      const slidesHTML = heroSlides.map((a, i) => {
        const pos = a.cover_position || 'center center';
        const ov  = a.hero_overlay ?? 0.82;
        const ov2 = (ov * 0.37).toFixed(2);
        return `
        <a href="review.html?id=${a.id}" class="hero-slide${i === 0 ? ' active' : ''}">
          ${a.cover_image
            ? `<div class="hero-bg" style="background-image:url('${a.cover_image}');background-position:${pos}"></div>`
            : '<div class="hero-bg"></div>'}
          <div class="hero-overlay" style="background:linear-gradient(to top,rgba(0,0,0,${ov}) 0%,rgba(0,0,0,${ov2}) 55%,transparent 100%)"></div>
          <div class="hero-content">
            <div class="hero-meta">
              ${a.genre ? `<span class="hero-kicker">${a.genre}</span>` : ''}
              <span class="hero-score">★ ${a.rating}</span>
              ${a.has_spoiler ? '<span class="hero-spoiler">有雷</span>' : ''}
            </div>
            <h2 class="hero-title">${a.title}</h2>
            <p class="hero-excerpt">${a.excerpt || ''}</p>
          </div>
        </a>`;
      }).join('');

      const dotsHTML = heroSlides.length > 1
        ? `<div class="hero-dots">${heroSlides.map((_,i) => `<button class="hero-dot${i===0?' active':''}" onclick="goSlide(${i})"></button>`).join('')}</div>`
        : '';

      document.getElementById('hero-section').innerHTML = `<div class="hero-banner">${slidesHTML}${dotsHTML}</div>`;

      if (heroSlides.length > 1) {
        let cur = 0;
        window.goSlide = (n) => {
          document.querySelectorAll('.hero-slide').forEach((s,i) => s.classList.toggle('active', i===n));
          document.querySelectorAll('.hero-dot').forEach((d,i) => d.classList.toggle('active', i===n));
          cur = n;
        };
        setInterval(() => goSlide((cur + 1) % heroSlides.length), 5000);
      }

      const movies = rest.filter(a => !a.content_type || a.content_type === 'movie');
      document.getElementById('latest-grid').innerHTML = movies.slice(0, 6).map(a => cardHTML(a)).join('');

      // 書評區塊
      const { data: books } = await db
        .from('articles').select('*')
        .eq('is_published', true).eq('content_type', 'book')
        .order('published_at', { ascending: false }).limit(4);
      if (books && books.length) {
        document.getElementById('books-section').style.display = '';
        document.getElementById('latest-books-grid').innerHTML = books.map(a => cardHTML(a)).join('');
      }
    }

    loadHome();

    // 連點三下 footer 進後台
    let clickCount = 0, clickTimer;
    document.getElementById('footer-copy').addEventListener('click', () => {
      clickCount++;
      clearTimeout(clickTimer);
      if (clickCount >= 3) { clickCount = 0; location.href = 'admin.html'; return; }
      clickTimer = setTimeout(() => { clickCount = 0; }, 600);
    });
  </script>
</body>
</html>
